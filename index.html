const Sound = {
    ctx: null,
    init() {
        if (!this.ctx) { const A = window.AudioContext || window.webkitAudioContext; this.ctx = new A(); }
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    _osc(freq, type, start, dur) {
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = type; o.frequency.setValueAtTime(freq, start);
        g.gain.setValueAtTime(0.1, start); g.gain.exponentialRampToValueAtTime(0.01, start + dur);
        o.connect(g); g.connect(this.ctx.destination); o.start(start); o.stop(start + dur);
    },
    playClick() { this.init(); this._osc(800, 'sine', this.ctx.currentTime, 0.1); },
    playCorrect() { this.init(); const t = this.ctx.currentTime; this._osc(523.25, 'sine', t, 0.2); this._osc(659.25, 'sine', t + 0.15, 0.4); },
    playWrong() { this.init(); this._osc(150, 'sawtooth', this.ctx.currentTime, 0.4); },
    playFanfare() { this.init(); const t = this.ctx.currentTime; this._osc(523.25, 'square', t, 0.2); this._osc(659.25, 'square', t + 0.2, 0.2); this._osc(783.99, 'square', t + 0.4, 0.6); }
};

function langSwitcher() {
    const ja = state.lang === 'ja';
    return `<div class="lang-switcher">

function topBar() {
    const homeBtn = state.step > 0

        : `<span></span>`;
    return `<div class="top-bar">${homeBtn}${langSwitcher()}</div>`;
}
function hdr(title) {
    return `<h2>${title}</h2>`;
}

// ==================== CODON TABLE HTML ====================
function generateCodonTableHtml() {
    const bases = ['U','C','A','G'];
    let html = '<div class="codon-table-container"><table class="codon-table">';
    html += '<tr><th>1\\2</th><th>U</th><th>C</th><th>A</th><th>G</th><th>3</th></tr>';
    bases.forEach(first => {
        html += `<tr><th rowspan="4">${first}</th>`;
        bases.forEach(second => {
            html += `<td rowspan="4" style="vertical-align:top;">`;
            bases.forEach(third => {
                const codon = first+second+third;
                const amino = codonTable[codon];
                const color = amino==='Stop' ? 'color:red;' : (amino==='Met' ? 'color:blue;font-weight:bold;' : '');
                html += `<div style="${color}">${codon} : ${amino}</div>`;
            });
            html += '</td>';
        });
        html += `<td style="border-bottom:1px solid #eee;">U</td></tr>`;
        html += `<tr><td style="border-bottom:1px solid #eee;">C</td></tr>`;
        html += `<tr><td style="border-bottom:1px solid #eee;">A</td></tr>`;
        html += `<tr><td>G</td></tr>`;
    });
    html += '</table></div>';
    return html;
}

// ==================== RENDER ====================
function render() {
    const app = document.getElementById('app');
    if (!app) return;

    if (state.step === 0) {
        const L = C[state.lang].landing;
        app.innerHTML = `
            ${topBar()}
            <div class="main-content">
            <h2>${t('appTitle')}</h2>
            <p>${L.desc}</p>
            <details>
                <summary class="license-box" style="padding:10px 14px; cursor:pointer; font-weight:bold; color:#3498db;">${L.licenseTitle}</summary>
                <div class="license-box" style="margin-top:0; border-top:none; border-radius:0 0 8px 8px;">${L.licenseBody}</div>
            </details>
            <details style="margin-top:10px;">
                <summary class="license-box" style="padding:10px 14px; cursor:pointer; font-weight:bold; color:#3498db;">${L.quickStart}</summary>
                <div class="license-box" style="margin-top:0; border-top:none; border-radius:0 0 8px 8px; text-align:left;">${L.quickBody}</div>
            </details>
            <details style="margin-top:10px;">
                <summary class="license-box" style="padding:10px 14px; cursor:pointer; font-weight:bold; color:#3498db;">${L.readmeTitle}</summary>
                <div class="license-box" style="margin-top:0; border-top:none; border-radius:0 0 8px 8px;"><pre class="readme-pre">${L.readmeText}</pre></div>
            </details>
            <button class="btn btn-start" onclick="Sound.playClick(); startLearning()">${L.start}</button>
            </div>
        `;
        return;
    }

    const progress = ((state.step - 1) / (state.totalSteps - 1)) * 100;
    let stepContent = '';

    switch (state.step) {
        case 1:  stepContent = getStep1Html();  break;
        case 2:
        case 3:
        case 4:
        case 5:
        case 6:
        case 9:
        case 11:
        case 12:
        case 13:
        case 14:
        case 15:
        case 20: stepContent = getQuizHtml(state.step); break;
        case 7:  stepContent = getStep7Html();  break;
        case 8:  stepContent = getStep8Html();  break;
        case 10: stepContent = getStep10Html(); break;
        case 16: stepContent = getStep16Html(); break;
        case 17: stepContent = getStep17Html(); break;
        case 18: stepContent = getStep18Html(); break;
        case 19: stepContent = getStep19Html(); break;
        case 21: stepContent = getStep21Html(); break;
        case 22: stepContent = getStep22Html(); break;
        default: stepContent = '<p>Error</p>';
    }

    app.innerHTML = `
        ${topBar()}
        <div class="main-content">
            <div class="content-area">${stepContent}</div>
            <div class="footer-area">
                <div class="progress-info">
                    <span>${t('progress')}</span>
                    <span>Step ${state.step} / ${state.totalSteps}</span>
                </div>
                <div class="progress-track"><div class="progress-bar" style="width:${progress}%"></div></div>
                <div class="step-nav">${Array.from({length: state.totalSteps}, (_, i) => {
                    const n = i + 1;
                    return `<button class="step-nav-btn${n === state.step ? ' active' : ''}" onclick="goToStep(${n})" title="Step ${n}">${n}</button>`;
                }).join('')}</div>
            </div>
        </div>
    `;
    equalizeOptionHeights();
}

        <div style="margin-top:20px;">
            <button class="btn btn-secondary" onclick="prevStep()">${t('back')}</button>
            <button class="btn" onclick="Sound.playClick(); nextStep()">${t('next')}</button>
        </div>
    `;
}

function getStep16Html() {
    const d = s(16);
    const codons = state.mrna.match(/.{1,3}/g) || [];
    const codonsHtml = codons.map((c, i) =>
        `<span class="codon-btn" onclick="selectStartCodon(${i}, '${c}')">${c}</span>`
    ).join('');
    return `
        ${hdr(d.title)}
        <p>${d.question}</p>
        <div class="sequence-box">${codonsHtml}</div>
        <div id="feedback" class="feedback"></div>
        <details><summary style="cursor:pointer; color:#3498db; margin:10px;">${t('showCodon')}</summary>${generateCodonTableHtml()}</details>
        <div style="margin-top:20px;">
            <button class="btn btn-secondary" onclick="prevStep()">${t('back')}</button>
        </div>
    `;
}

function getStep17Html() {
    const d = s(17);
    const codons = state.mrna.match(/.{1,3}/g) || [];
    const codonsHtml = codons.map((c, i) => {
        if (i <= state.startCodonIndex) return `<span style="color:#ccc; margin:2px; font-family:monospace;">${c}</span>`;
        return `<span class="codon-btn" onclick="selectStopCodon(${i}, '${c}')">${c}</span>`;
    }).join('');
    return `
        ${hdr(d.title)}
        <p>${d.question}</p>
        <div class="sequence-box">${codonsHtml}</div>
        <div id="feedback" class="feedback"></div>
        <details><summary style="cursor:pointer; color:#3498db; margin:10px;">${t('showCodon')}</summary>${generateCodonTableHtml()}</details>
        <div style="margin-top:20px;">
            <button class="btn btn-secondary" onclick="prevStep()">${t('back')}</button>
        </div>
    `;
}

function getStep18Html() {
    const d = s(18);
    const codons = state.mrna.match(/.{1,3}/g) || [];
    const rangeHtml = codons.map((c, i) => {
        if (i < state.startCodonIndex || i > state.stopCodonIndex) return `<span style="color:#ccc; font-family:monospace;">${c} </span>`;
        if (i === state.stopCodonIndex) return `<span style="color:red; font-family:monospace;">${c} </span>`;
        return `<span style="font-family:monospace;">${c} </span>`;
    }).join('');
    return `
        ${hdr(d.title)}
        <p>${d.desc}</p>
        <div class="sequence-box">${rangeHtml}</div>
        <details><summary style="cursor:pointer; color:#3498db; margin:10px;">${t('showCodon')}</summary>${generateCodonTableHtml()}</details>
        <div style="margin-top:20px;">
            <button class="btn btn-secondary" onclick="prevStep()">${t('back')}</button>
            <button class="btn" onclick="Sound.playClick(); calcTranslation(); nextStep();">${d.doneBtn}</button>
        </div>
    `;
}

function getStep19Html() {
    const d = s(19);
    const aminoStr = state.aminoAcids.join('–');
    return `
        ${hdr(d.title)}
        <p>${d.desc}</p>
        <div class="sequence-box" style="font-weight:bold; color:#d35400;">${aminoStr}</div>
        <div style="margin-top:20px;">
            <button class="btn btn-secondary" onclick="prevStep()">${t('back')}</button>
            <button class="btn" onclick="Sound.playClick(); nextStep()">${d.confirmBtn}</button>
        </div>
    `;
}

function getStep21Html() {
    Sound.playFanfare();
    const d = s(21);
    return `
        ${hdr(d.title)}
        <p>${d.desc}</p>
        <img src="image_GFP.png" class="protein-img" alt="GFP structure (PDB 1EMA)">
        <details class="fig-credit">
            <summary>ⓘ Credit</summary>
            <p>${d.figCaption}</p>
        </details>
        <div style="margin-top:20px;">
            <button class="btn" onclick="Sound.playClick(); nextStep()">${d.nextBtn}</button>
        </div>
    `;
}

function getStep22Html() {
    const d = s(22);
    const tasksHtml = d.tasks.map((t, i) => `<li>${t}</li>`).join('');
    return `
        ${hdr(d.title)}
        <div class="worksheet-box">
            <ol>${tasksHtml}</ol>
        </div>
        <div style="margin-top:20px;">
            <button class="btn btn-secondary" onclick="prevStep()">${t('back')}</button>
            <button class="btn" onclick="Sound.playClick(); location.reload()">${d.restartBtn}</button>
        </div>
    `;
}

// ==================== LOGIC ====================

function startLearning() { state.step = 1; render(); }
function goToStep(n) { if (n >= 0 && n <= state.totalSteps) { state.step = n; render(); } }
function addBase(base) { state.dna += base; render(); }
function clearDNA() { state.dna = ''; render(); }
function setSampleDNA() { state.dna = 'ATGACTTTTTCTTATGGTGTTTGA'; render(); }

function prevStep() {
    if (state.step > 1) { state.step--; render(); }
    else { state.step = 0; render(); }
}

function nextStep() {
    if (state.step < state.totalSteps) { state.step++; render(); }
}

function checkAndNextStep() {
    const mrna = state.dna.replace(/T/g, 'U');
    const codons = mrna.match(/.{1,3}/g) || [];
    const d = s(1);
    if (!codons.includes('AUG')) {
        Sound.playWrong();
        showFeedback(d.errAUG, 'error');
        return;
    }
    const stops = ['UAA','UAG','UGA'];
    if (!codons.some(c => stops.includes(c))) {
        Sound.playWrong();
        showFeedback(d.errStop, 'error');
        return;
    }
    state.mrna = mrna;
    nextStep();
}

function showFeedback(msg, type) {
    const fb = document.getElementById('feedback');
    if (!fb) return;
    fb.className = 'feedback ' + type;
    fb.innerHTML = msg;
}

function hideFeedback() {
    const fb = document.getElementById('feedback');
    if (fb) { fb.className = 'feedback'; fb.innerHTML = ''; }
}

function checkSingleQuiz(stepNum, idx, btn) {
    const d = s(stepNum);
    const isCorrect = d.correct.includes(idx);
    // Disable all buttons
    d.options.forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) {
            b.disabled = true;
            if (d.correct.includes(i)) b.className = 'btn btn-option correct-ans';
            else if (i === idx) b.className = 'btn btn-option wrong-ans';
        }
    });
    if (isCorrect) {
        Sound.playCorrect();
        showFeedback(`${t('correctPfx')} ${d.explanation}`, 'success');
        const nb = document.getElementById('next-btn');
        if (nb) nb.style.display = 'inline-block';
    } else {
        Sound.playWrong();
        showFeedback(`${t('wrongPfx')} ${d.explanation}<br><button class="btn-retry" onclick="Sound.playClick(); render()">${t('retry')}</button>`, 'error');
    }
}

function toggleStep8(idx) {
    if (state.step8Done) return;
    Sound.playClick();
    if (state.step8Sel.has(idx)) state.step8Sel.delete(idx);
    else state.step8Sel.add(idx);
    // Update button appearance without full re-render
    const d = s(8);
    d.options.forEach((_, i) => {
        const b = document.getElementById(`opt8-${i}`);
        if (b) b.className = 'btn btn-option' + (state.step8Sel.has(i) ? ' selected' : '');
    });
}

function submitStep8() {
    const d = s(8);
    const correctSet = new Set(d.correct);
    const selSet = state.step8Sel;
    const isCorrect = correctSet.size === selSet.size && [...correctSet].every(i => selSet.has(i));
    // Mark buttons
    d.options.forEach((_, i) => {
        const b = document.getElementById(`opt8-${i}`);
        if (b) {
            b.disabled = true;
            if (d.correct.includes(i)) b.className = 'btn btn-option correct-ans';
            else if (selSet.has(i)) b.className = 'btn btn-option wrong-ans';
        }
    });
    if (isCorrect) {
        Sound.playCorrect();
        state.step8Done = true;
        showFeedback(`${t('correctPfx')} ${d.explanation}`, 'success');
        const nb = document.getElementById('next-btn');
        if (nb) nb.style.display = 'inline-block';
    } else {
        Sound.playWrong();
        showFeedback(`${t('wrongPfx')} ${d.explanation}<br><button class="btn-retry" onclick="Sound.playClick(); state.step8Sel.clear(); state.step8Done=false; render()">${t('retry')}</button>`, 'error');
    }
}

function selectStartCodon(index, codon) {
    const d = s(16);
    if (codon === 'AUG') {
        Sound.playCorrect();
        state.startCodonIndex = index;
        showFeedback(`${t('correctPfx')} ${d.explanation}`, 'success');
        setTimeout(nextStep, 1200);
    } else {
        Sound.playWrong();
        showFeedback(`${codon}${d.wrongTmpl}`, 'error');
    }
}

function selectStopCodon(index, codon) {
    const d = s(17);
    if (['UAA','UAG','UGA'].includes(codon)) {
        Sound.playCorrect();
        state.stopCodonIndex = index;
        showFeedback(`${t('correctPfx')} ${d.explanation}`, 'success');
        setTimeout(nextStep, 1200);
    } else {
        Sound.playWrong();
        showFeedback(d.wrongMsg, 'error');
    }
}

function calcTranslation() {
    const codons = state.mrna.match(/.{1,3}/g) || [];
    state.aminoAcids = [];
    for (let i = state.startCodonIndex; i < state.stopCodonIndex; i++) {
        state.aminoAcids.push(codonTable[codons[i]] || '?');
    }
}

function equalizeOptionHeights() {
    requestAnimationFrame(() => {
        const btns = document.querySelectorAll('.btn-option');
        if (!btns.length) return;
        btns.forEach(b => b.style.height = '');
        let maxH = 0;
        btns.forEach(b => maxH = Math.max(maxH, b.offsetHeight));
        btns.forEach(b => b.style.height = maxH + 'px');
    });
}

function setLang(lang) {
    if (state.lang === lang) return;
    state.lang = lang;
    document.documentElement.lang = lang;
    state.step8Sel.clear();
    state.step8Done = false;
    render();
}

window.onload = function() {
    render();
    equalizeOptionHeights();
    document.body.addEventListener('click', () => Sound.init(), { once: true });
};
</script>
